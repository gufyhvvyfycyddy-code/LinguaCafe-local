# ============================================================
# OpenCode Executor
# 
# Triggered by /opencode or /oc comments on Issues or PRs.
# Runs OpenCode with the specified task, model, and skills.
# Reports results back as a comment.
#
# Security: requires DEEPSEEK_API_KEY secret.
# Branch protection: never pushes to master, never auto-merges.
# ============================================================

name: OpenCode Executor

on:
  issue_comment:
    types: [created]

jobs:
  opencode-execute:
    # Only run if comment starts with /opencode or /oc
    if: |
      github.event_name == 'issue_comment' &&
      (startsWith(github.event.comment.body, '/opencode') ||
       startsWith(github.event.comment.body, '/oc '))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: read

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENCODE_MODEL: deepseek-v4-flash

    steps:
      # -------------------------------------------------------
      # Step 1: Validate Secrets
      # -------------------------------------------------------
      - name: Check DeepSeek API Key
        run: |
          if [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "::error::DEEPSEEK_API_KEY is not set. Please configure it in repository Secrets."
            exit 1
          fi
          echo "DEEPSEEK_API_KEY configured successfully"

      # -------------------------------------------------------
      # Step 2: Checkout repository
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Step 3: Setup Node.js
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # -------------------------------------------------------
      # Step 4: Install OpenCode
      # -------------------------------------------------------
      - name: Install OpenCode
        run: |
          npm install -g opencode@latest
          opencode --version

      # -------------------------------------------------------
      # Step 5: Parse task from comment
      # -------------------------------------------------------
      - name: Parse task from comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.issue.pull_request.number }}
        run: |
          # Extract the comment body
          BODY="${{ github.event.comment.body }}"

          # Remove the trigger prefix (/opencode or /oc)
          TASK=$(echo "$BODY" | sed 's/^\/opencode\s*//;s/^\/oc\s*//')

          # Determine the target: issue or PR
          TARGET_TYPE="issue"
          TARGET_NUMBER="${{ github.event.issue.number }}"

          if [ -n "${{ github.event.issue.pull_request.url }}" ]; then
            TARGET_TYPE="pr"
            TARGET_NUMBER="${{ github.event.issue.number }}"
          fi

          echo "task<<EOF" >> $GITHUB_OUTPUT
          echo "$TASK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "target_type=$TARGET_TYPE" >> $GITHUB_OUTPUT
          echo "target_number=$TARGET_NUMBER" >> $GITHUB_OUTPUT

          # Also store for later steps
          echo "TASK=$TASK" >> $GITHUB_ENV
          echo "TARGET_TYPE=$TARGET_TYPE" >> $GITHUB_ENV
          echo "TARGET_NUMBER=$TARGET_NUMBER" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Step 6: Determine attempt number from labels
      # -------------------------------------------------------
      - name: Determine attempt number
        id: attempt
        run: |
          # Get current labels on the issue/PR
          LABELS_JSON=$(gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
            --jq '.[].name' 2>/dev/null || echo "")

          ATTEMPT=1
          if echo "$LABELS_JSON" | grep -q "auto-fix/attempt-3"; then
            ATTEMPT=4
          elif echo "$LABELS_JSON" | grep -q "auto-fix/attempt-2"; then
            ATTEMPT=3
          elif echo "$LABELS_JSON" | grep -q "auto-fix/attempt-1"; then
            ATTEMPT=2
          fi

          # If attempt >= 3 and we're here, this is a continuation
          # Check that this was approved
          if [ "$ATTEMPT" -ge 4 ]; then
            echo "::error::Max auto-fix attempts (3) already reached. Needs human review."
            echo "attempt=3" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "value=$ATTEMPT" >> $GITHUB_OUTPUT
          echo "ATTEMPT=$ATTEMPT" >> $GITHUB_ENV
          echo "Current attempt: $ATTEMPT"

      # -------------------------------------------------------
      # Step 7: Create feature branch
      # -------------------------------------------------------
      - name: Create feature branch
        id: branch
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME="auto-fix/attempt-${{ steps.attempt.outputs.value }}-$TIMESTAMP"
          git config user.name "opencode-bot"
          git config user.email "opencode-bot@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Step 8: Run OpenCode
      # -------------------------------------------------------
      - name: Run OpenCode
        id: opencode
        env:
          OPENCODE_SERVER_USERNAME: ""
          OPENCODE_SERVER_PASSWORD: ""
        run: |
          TASK_CONTENT="${{ steps.parse.outputs.task }}"

          # Build the full task prompt with all requirements
          FULL_PROMPT=$(cat <<-PROMPT_END
          ## Task (Attempt ${{ steps.attempt.outputs.value }})

          $TASK_CONTENT

          ## Model Requirement
          You MUST use the model: deepseek-v4-flash (DeepSeek Flash).
          Do NOT fall back to any other model. If deepseek-v4-flash is unavailable, fail immediately.

          ## Superpowers / Skills Requirement
          Before starting work, use the OpenCode skill tool to discover available skills.
          Select the most appropriate skill(s) for this task based on the task type.
          After completing the work, report which skill(s) you actually used.
          If no skill was appropriate, explain why.

          ## Branch
          You are on branch: ${{ steps.branch.outputs.name }}
          Make all changes on this branch. Do NOT push to master.

          ## Task Output Format
          After completing the work, output a structured report inside <open-code-report> tags:

          <open-code-report>
          [attempt: ${{ steps.attempt.outputs.value }}]
          [model: deepseek-v4-flash]
          [skills: <list what you used>]
          [modified_files: <list files changed>]
          [changes: <summary of changes>]
          [tests_run: <list tests executed>]
          [tests_passed: yes/no]
          [failures: <remaining issues or "none">]
          [next_step: <suggestion>]
          </open-code-report>

          Also append a machine-readable marker at the very end:
          <!-- opencode-loop: attempt=${{ steps.attempt.outputs.value }} status=running -->
          PROMPT_END

          echo "Running OpenCode with deepseek-v4-flash..."

          # Run opencode with the provider configured in the project's opencode.json
          # Use pipefail so that opencode failure is not masked by tee
          set -o pipefail
          opencode run "$FULL_PROMPT" \
            --model deepseek-v4-flash \
            --dangerously-skip-permissions \
            --print-logs 2>&1 | tee opencode_output.txt

          # Check if the model was actually used
          if grep -qi "model.*not found\|model.*unavailable\|failed to load model\|fallback" opencode_output.txt 2>/dev/null; then
            echo "::error::deepseek-v4-flash was unavailable or a fallback was attempted!"
            echo "model_ok=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "model_ok=true" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 9: Create PR (if changes exist)
      # -------------------------------------------------------
      - name: Create Pull Request
        id: pr
        run: |
          cd "${{ github.workspace }}"

          # Check if there are changes
          if git diff --quiet HEAD~1 -- . 2>/dev/null || git diff --stat --exit-code 2>/dev/null; then
            echo "No changes detected."
            echo "created=false" >> $GITHUB_OUTPUT
          else
            # Stage and commit changes
            git add -A
            TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
            git commit -m "fix: auto-fix attempt ${{ steps.attempt.outputs.value }} [skip ci]

            Auto-generated by OpenCode Executor (attempt ${{ steps.attempt.outputs.value }}).
            Triggered by ${{ github.event.comment.html_url }}

            OpenCode model: deepseek-v4-flash
            "

            # Push to the feature branch
            git push origin "${{ steps.branch.outputs.name }}"

            # Create PR
            PR_URL=$(gh pr create \
              --base master \
              --head "${{ steps.branch.outputs.name }}" \
              --title "Auto-fix: attempt ${{ steps.attempt.outputs.value }}" \
              --body "Auto-fix attempt ${{ steps.attempt.outputs.value }} by OpenCode.

            Trigger: ${{ github.event.comment.html_url }}

            ⚠️ This PR was auto-generated. It must NOT be auto-merged.
            " \
              --label "auto-fix" \
              --reviewer "${{ github.repository_owner }}")

            echo "created=true" >> $GITHUB_OUTPUT
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          fi

      # -------------------------------------------------------
      # Step 10: Run tests on PR
      # -------------------------------------------------------
      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          # For this Laravel project, run the project's tests
          TESTS_PASSED=true

          # Check if PHP is available (Laravel project)
          if command -v php &> /dev/null; then
            composer install --no-interaction --prefer-dist --quiet 2>/dev/null || true

            echo "Running ReviewFsrsTest..."
            php artisan test --filter=ReviewFsrsTest --quiet 2>&1 || TESTS_PASSED=false

            echo "Running FsrsSchedulingServiceTest..."
            php artisan test --filter=FsrsSchedulingServiceTest --quiet 2>&1 || TESTS_PASSED=false

            echo "Running WordSense tests..."
            php artisan test --filter=WordSense --quiet 2>&1 || TESTS_PASSED=false
          else
            echo "PHP not available in runner, using generic test detection"
            TESTS_PASSED=true
          fi

          if [ "$TESTS_PASSED" = "true" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------------
      # Step 11: Report results as comment
      # -------------------------------------------------------
      - name: Post result comment
        id: report
        env:
          ATTEMPT: ${{ steps.attempt.outputs.value }}
          PR_CREATED: ${{ steps.pr.outputs.created }}
          PR_URL: ${{ steps.pr.outputs.url }}
          TESTS_PASSED: ${{ steps.tests.outputs.passed }}
        run: |
          # Read OpenCode output for the structured report
          REPORT=""
          if [ -f opencode_output.txt ]; then
            # Extract report from opencode output (between <open-code-report> tags)
            REPORT=$(sed -n '/<open-code-report>/,/<\/open-code-report>/p' opencode_output.txt 2>/dev/null)
          fi

          if [ -z "$REPORT" ]; then
            REPORT="[No structured report was generated by OpenCode]"
          fi

          STATUS=""
          if [ "$TESTS_PASSED" = "true" ]; then
            STATUS="passed"
          else
            STATUS="failed"
          fi

          # Build summary
          SUMMARY="## 🤖 OpenCode Execution Report (Attempt $ATTEMPT)

          **Model:** deepseek-v4-flash
          **Tests passed:** $TESTS_PASSED
          **PR created:** $PR_CREATED
          **PR URL:** $PR_URL

          ### Execution Details

          $REPORT

          ### Machine-readable marker

          <!-- opencode-loop: attempt=$ATTEMPT status=$STATUS -->"

          # Post to issue/PR
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            --method POST \
            --field "body=$SUMMARY"

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 12: Update labels
      # -------------------------------------------------------
      - name: Update labels
        run: |
          ATTEMPT="${{ steps.attempt.outputs.value }}"
          STATUS="${{ steps.report.outputs.status }}"

          # Remove previous attempt labels
          for i in 1 2 3; do
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels/auto-fix/attempt-$i" \
              --method DELETE --silent 2>/dev/null || true
          done

          # Add current attempt label
          if [ "$ATTEMPT" -le 3 ]; then
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=auto-fix/attempt-$ATTEMPT" \
              --silent 2>/dev/null || true
          fi

          # If tests passed, add passed label
          if [ "$STATUS" = "passed" ]; then
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=auto-fix/passed" \
              --silent 2>/dev/null || true
          fi

      # -------------------------------------------------------
      # Step 13: Trigger auto-fix scheduler if tests failed
      # -------------------------------------------------------
      - name: Trigger auto-fix scheduler on failure
        if: steps.report.outputs.status == 'failed'
        run: |
          ATTEMPT="${{ steps.attempt.outputs.value }}"

          if [ "$ATTEMPT" -lt 3 ]; then
            echo "Tests failed on attempt $ATTEMPT. Firing auto-fix-scheduler for attempt $((ATTEMPT + 1))."
            # Dispatch the scheduler workflow
            gh workflow run auto-fix-scheduler.yml \
              --ref master \
              --field issue_number=${{ github.event.issue.number }} \
              --field repository=${{ github.repository }} \
              --field attempt=$ATTEMPT
          else
            echo "Tests failed on attempt $ATTEMPT (maximum). Adding needs-human-review label."
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=needs-human-review" \
              --silent 2>/dev/null || true

            # Post a summary for human review
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
              --method POST \
              --field "body=## ⛔ Auto-fix stopped after $ATTEMPT attempts

            OpenCode has attempted to fix this issue $ATTEMPT times without success.

            - **Attempts made:** $ATTEMPT
            - **Label:** needs-human-review has been added
            - **What to do:** Review the execution reports above, examine the changes, and determine next steps.

            If you want to continue auto-fixing, comment \`继续自动修复\` to reset and start a new cycle."
          fi

      # -------------------------------------------------------
      # Step 14: Final status output
      # -------------------------------------------------------
      - name: Final status
        run: |
          echo "========================================"
          echo "OpenCode Executor finished"
          echo "Attempt: ${{ steps.attempt.outputs.value }}"
          echo "Tests: ${{ steps.report.outputs.status }}"
          echo "========================================"

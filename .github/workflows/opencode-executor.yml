# ============================================================
# OpenCode Executor
#
# Triggered by /opencode or /oc comments on Issues or PRs.
# Runs OpenCode with OpenCode Go plan (opencode-go/deepseek-v4-flash).
# Reports results back as a comment.
#
# Security:
#   - Requires OPENCODE_GO_API_KEY secret (NOT DeepSeek API Key)
#   - Never pushes to master, never auto-merges
#   - Model locked to opencode-go/deepseek-v4-flash, no fallback
#   - Report must include [skills:] field to verify Superpowers usage
# ============================================================

name: OpenCode Executor

on:
  issue_comment:
    types: [created]

# Environment variable used by OpenCode to authenticate with OpenCode Go
# OPENCODE_GO_API_KEY must be set in GitHub Secrets
env:
  OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}

jobs:
  opencode-execute:
    # Only run if comment starts with /opencode or /oc
    if: |
      github.event_name == 'issue_comment' &&
      (startsWith(github.event.comment.body, '/opencode') ||
       startsWith(github.event.comment.body, '/oc '))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      # -------------------------------------------------------
      # Step 1: Validate Secret
      # -------------------------------------------------------
      - name: Check OpenCode Go API Key
        run: |
          if [ -z "${{ secrets.OPENCODE_GO_API_KEY }}" ]; then
            echo "::error::OPENCODE_GO_API_KEY is not set."
            echo "::error::Please configure it in repository Settings -> Secrets and variables -> Actions."
            echo "::error::This is your OpenCode Go API Key, NOT a DeepSeek API Key."
            exit 1
          fi
          echo "OPENCODE_GO_API_KEY configured successfully"

      # -------------------------------------------------------
      # Step 2: Validate model config (no accidental DeepSeek references)
      # -------------------------------------------------------
      - name: Validate model configuration
        run: |
          # Check for explicit DeepSeek API endpoints (not opencode-go format)
          if grep -q 'api\.deepseek\.com' opencode.json 2>/dev/null; then
            echo "::error::opencode.json contains deprecated DeepSeek API endpoint (api.deepseek.com)."
            echo "::error::The config should use opencode-go/deepseek-v4-flash, not the DeepSeek API directly."
            exit 1
          fi
          # Verify the model is set to opencode-go
          if grep -q 'opencode-go/deepseek-v4-flash' opencode.json 2>/dev/null; then
            echo "Model config validation passed: opencode-go/deepseek-v4-flash configured"
          else
            echo "::warning::opencode-go/deepseek-v4-flash not explicitly set in opencode.json. Using CLI --model flag."
          fi

      # -------------------------------------------------------
      # Step 3: Checkout repository
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Step 4: Setup Node.js
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # -------------------------------------------------------
      # Step 5: Install OpenCode
      # -------------------------------------------------------
      - name: Install OpenCode
        run: |
          npm install -g opencode-ai@latest
          echo "OpenCode version: $(opencode --version)"

      # -------------------------------------------------------
      # Step 6: Parse task from comment
      # -------------------------------------------------------
      - name: Save comment body to file
        id: parse
        run: |
          # Extract comment body from the GitHub event JSON payload (safe for multi-line)
          jq -r '.comment.body' "$GITHUB_EVENT_PATH" > /tmp/opencode_comment_body.txt

          # Also save the issue/PR number
          ISSUE_NUM=$(jq -r '.issue.number // .pull_request.number' "$GITHUB_EVENT_PATH")
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

          # Check if it's a PR
          PR_URL=$(jq -r '.issue.pull_request.url // ""' "$GITHUB_EVENT_PATH")
          if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
            echo "target_type=pr" >> $GITHUB_OUTPUT
          else
            echo "target_type=issue" >> $GITHUB_OUTPUT
          fi

          # Remove /opencode or /oc prefix and save as task
          sed 's/^\/opencode\s*//;s/^\/oc\s*//' /tmp/opencode_comment_body.txt > /tmp/opencode_task.txt

      # -------------------------------------------------------
      # Step 7: Determine attempt number from labels
      # -------------------------------------------------------
      - name: Determine attempt number
        id: attempt
        run: |
          LABELS_JSON=$(gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
            --jq '.[].name' 2>/dev/null || echo "")

          ATTEMPT=1
          if echo "$LABELS_JSON" | grep -q "auto-fix/attempt-3"; then
            ATTEMPT=4
          elif echo "$LABELS_JSON" | grep -q "auto-fix/attempt-2"; then
            ATTEMPT=3
          elif echo "$LABELS_JSON" | grep -q "auto-fix/attempt-1"; then
            ATTEMPT=2
          fi

          if [ "$ATTEMPT" -ge 4 ]; then
            echo "::error::Max auto-fix attempts (3) already reached. Needs human review."
            echo "attempt=3" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "value=$ATTEMPT" >> $GITHUB_OUTPUT
          echo "ATTEMPT=$ATTEMPT" >> $GITHUB_ENV
          echo "Current attempt: $ATTEMPT"

      # -------------------------------------------------------
      # Step 8: Create feature branch (never master)
      # -------------------------------------------------------
      - name: Create feature branch
        id: branch
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME="auto-fix/attempt-${{ steps.attempt.outputs.value }}-$TIMESTAMP"
          git config user.name "opencode-bot"
          git config user.email "opencode-bot@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Step 9: Run OpenCode with OpenCode Go
      # -------------------------------------------------------
      - name: Run OpenCode
        id: opencode
        env:
          OPENCODE_SERVER_USERNAME: ""
          OPENCODE_SERVER_PASSWORD: ""
        shell: bash
        run: |
          # Build prompt by concatenating parts (avoids heredoc injection issues)
          ATTEMPT="${{ steps.attempt.outputs.value }}"
          BRANCH="${{ steps.branch.outputs.name }}"

          # Write header with task content from file (multi-line safe)
          echo "## Task (Attempt $ATTEMPT)" > /tmp/opencode_final_prompt.txt
          echo "" >> /tmp/opencode_final_prompt.txt
          cat /tmp/opencode_task.txt >> /tmp/opencode_final_prompt.txt
          echo "" >> /tmp/opencode_final_prompt.txt
          echo "" >> /tmp/opencode_final_prompt.txt

          # Append the rest of the prompt
          cat >> /tmp/opencode_final_prompt.txt << 'PROMPT_EOF'

          ## Model Requirement
          You MUST use the model: opencode-go/deepseek-v4-flash (OpenCode Go plan).
          NEVER use deepseek API directly, deepseek/deepseek-v4-flash, or any other model.
          If opencode-go/deepseek-v4-flash is unavailable, fail immediately.

          ## Skills / Superpowers Requirement
          Before starting work, use the OpenCode skill tool to discover available skills.
          Select the most appropriate skill(s) for this task.
          After completing the work, report which skill(s) you actually used.
          If no skill was appropriate, explain why.
          If the skill tool is unavailable or finds no skills, state that explicitly.

          ## Branch
          You are on branch: $BRANCH
          Make ALL changes on this branch. Do NOT touch master.

          ## Safety
          - Do NOT modify: .github/workflows/, opencode.json, docs/codex-opencode-loop.md, AGENTS.md
          - Do NOT modify business code (PHP, Vue, JS, CSS, database migrations) unless the task requires it
          - NEVER push to master
          - NEVER auto-merge

          ## Report Format
          After completing the work, output a structured report inside <open-code-report> tags:

          <open-code-report>
          [attempt: $ATTEMPT]
          [model: opencode-go/deepseek-v4-flash]
          [skills: <list what you used, or "none" with reason>]
          [modified_files: <list files changed>]
          [changes: <summary of changes>]
          [tests_run: <list tests executed>]
          [tests_passed: yes/no]
          [failures: <remaining issues or "none">]
          [next_step: <suggestion>]
          </open-code-report>

          Append a machine-readable marker at the very end:
          <!-- opencode-loop: attempt=$ATTEMPT status=running -->
          PROMPT_EOF

          echo "Running OpenCode with opencode-go/deepseek-v4-flash..."

          set -o pipefail
          opencode run "$(cat /tmp/opencode_final_prompt.txt)" \
            --model opencode-go/deepseek-v4-flash \
            --dangerously-skip-permissions \
            --print-logs 2>&1 | tee opencode_output.txt

          # Verify the correct model was used (reject fallback)
          if grep -q "model not found\|model.*unavailable\|fallback\|deepseek API\|deepseek/deepseek" opencode_output.txt 2>/dev/null; then
            echo "::error::Wrong model or fallback detected! Only opencode-go/deepseek-v4-flash is allowed."
            echo "model_ok=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "model_ok=true" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 10: Create PR (never auto-merge)
      # -------------------------------------------------------
      - name: Create Pull Request
        id: pr
        run: |
          cd "${{ github.workspace }}"

          if git diff --quiet HEAD~1 -- . 2>/dev/null || git diff --stat --exit-code 2>/dev/null; then
            echo "No changes detected. Skipping PR creation."
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "fix: auto-fix attempt ${{ steps.attempt.outputs.value }} [skip ci]

            Auto-generated by OpenCode Executor (attempt ${{ steps.attempt.outputs.value }}).
            Model: opencode-go/deepseek-v4-flash
            Trigger: ${{ github.event.comment.html_url }}
            "

            git push origin "${{ steps.branch.outputs.name }}"

            PR_URL=$(gh pr create \
              --base master \
              --head "${{ steps.branch.outputs.name }}" \
              --title "Auto-fix: attempt ${{ steps.attempt.outputs.value }}" \
              --body "Auto-fix attempt ${{ steps.attempt.outputs.value }} by OpenCode (OpenCode Go).

            Trigger: ${{ github.event.comment.html_url }}

            ## NOT auto-merge
            This PR is auto-generated and must be reviewed manually. Do NOT auto-merge.
            " \
              --label "auto-fix")

            echo "created=true" >> $GITHUB_OUTPUT
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          fi

      # -------------------------------------------------------
      # Step 11: Run tests on PR
      # -------------------------------------------------------
      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          TESTS_PASSED=true

          if command -v php &> /dev/null && [ -f "artisan" ]; then
            composer install --no-interaction --prefer-dist --quiet 2>/dev/null || true

            echo "Running ReviewFsrsTest..."
            php artisan test --filter=ReviewFsrsTest --quiet 2>&1 || TESTS_PASSED=false

            echo "Running FsrsSchedulingServiceTest..."
            php artisan test --filter=FsrsSchedulingServiceTest --quiet 2>&1 || TESTS_PASSED=false

            echo "Running WordSense tests..."
            php artisan test --filter=WordSense --quiet 2>&1 || TESTS_PASSED=false
          else
            echo "PHP/artisan not available in runner. Tests skipped."
          fi

          if [ "$TESTS_PASSED" = "true" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------------
      # Step 12: Post result comment
      # -------------------------------------------------------
      - name: Post result comment
        id: report
        run: |
          ATTEMPT="${{ steps.attempt.outputs.value }}"
          PR_CREATED="${{ steps.pr.outputs.created }}"
          PR_URL="${{ steps.pr.outputs.url }}"
          TESTS_PASSED="${{ steps.tests.outputs.passed }}"

          REPORT=""
          if [ -f opencode_output.txt ]; then
            REPORT=$(sed -n '/<open-code-report>/,/<\/open-code-report>/p' opencode_output.txt 2>/dev/null)
          fi

          if [ -z "$REPORT" ]; then
            REPORT="[No structured report was generated by OpenCode]"
          fi

          STATUS="failed"
          if [ "$TESTS_PASSED" = "true" ]; then
            STATUS="passed"
          fi

          # Verify report contains skills field
          SKILLS_MENTIONED=""
          if echo "$REPORT" | grep -qi '\[skills:'; then
            SKILLS_MENTIONED="yes"
          else
            SKILLS_MENTIONED="no"
            echo "::warning::OpenCode report did not include [skills:] field. Superpowers usage not confirmed."
          fi

          SUMMARY="## OpenCode Execution Report (Attempt $ATTEMPT)

          **Model:** opencode-go/deepseek-v4-flash (OpenCode Go)
          **Tests passed:** $TESTS_PASSED
          **PR created:** $PR_CREATED
          **PR URL:** $PR_URL
          **Skills reported:** $SKILLS_MENTIONED

          ### Execution Details

          $REPORT

          ### Machine-readable marker

          <!-- opencode-loop: attempt=$ATTEMPT status=$STATUS -->"

          gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            --method POST \
            --field "body=$SUMMARY"

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 13: Update labels
      # -------------------------------------------------------
      - name: Update labels
        run: |
          ATTEMPT="${{ steps.attempt.outputs.value }}"
          STATUS="${{ steps.report.outputs.status }}"

          # Remove previous attempt labels (1-3)
          for i in 1 2 3; do
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels/auto-fix/attempt-$i" \
              --method DELETE --silent 2>/dev/null || true
          done

          # Add current attempt label
          if [ "$ATTEMPT" -le 3 ]; then
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=auto-fix/attempt-$ATTEMPT" \
              --silent 2>/dev/null || true
          fi

          if [ "$STATUS" = "passed" ]; then
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=auto-fix/passed" \
              --silent 2>/dev/null || true
          fi

      # -------------------------------------------------------
      # Step 14: Trigger auto-fix scheduler if tests failed
      # -------------------------------------------------------
      - name: Trigger auto-fix scheduler on failure
        if: steps.report.outputs.status == 'failed'
        run: |
          ATTEMPT="${{ steps.attempt.outputs.value }}"

          if [ "$ATTEMPT" -lt 3 ]; then
            echo "Tests failed on attempt $ATTEMPT. Firing auto-fix-scheduler for attempt $((ATTEMPT + 1))."
            gh workflow run auto-fix-scheduler.yml \
              --ref master \
              --field issue_number=${{ github.event.issue.number }} \
              --field repository=${{ github.repository }} \
              --field attempt=$ATTEMPT
          else
            echo "Tests failed on attempt $ATTEMPT (max). Adding needs-human-review label."
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              --method POST \
              --field "labels[]=needs-human-review" \
              --silent 2>/dev/null || true

            gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
              --method POST \
              --field "body=## Auto-fix stopped after $ATTEMPT attempts

            OpenCode attempted to fix this $ATTEMPT times without success.

            - **Attempts:** $ATTEMPT (max)
            - **Label:** needs-human-review added
            - **Next:** Review the reports above, examine the changes, and fix manually.

            To restart the auto-fix cycle, remove \`needs-human-review\` label and comment \`继续自动修复\` or \`/opencode continue\`."
          fi

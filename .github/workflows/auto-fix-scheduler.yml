# ============================================================
# Auto-Fix Scheduler
#
# Acts as the automated dispatcher for auto-fix attempts.
# Triggered by opencode-executor.yml when tests fail and attempts < 3.
# Reads the failure report, generates a new /opencode command,
# and posts it to the issue/PR to start the next attempt.
#
# Max 3 total attempts. After 3, adds needs-human-review and stops.
# Uses double-check mechanism: HTML comment markers + GitHub labels.
# ============================================================

name: Auto-Fix Scheduler

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number'
        required: true
        type: string
      attempt:
        description: 'Previous attempt number'
        required: true
        type: string

jobs:
  schedule-next-attempt:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    env:
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.inputs.issue_number }}
      PREV_ATTEMPT: ${{ inputs.attempt || github.event.inputs.attempt }}

    steps:
      # -------------------------------------------------------
      # Step 1: Calculate next attempt
      # -------------------------------------------------------
      - name: Calculate next attempt
        id: calc
        run: |
          PREV="${{ env.PREV_ATTEMPT }}"
          NEXT=$((PREV + 1))
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "NEXT_ATTEMPT=$NEXT" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Step 2: Read previous execution report
      # -------------------------------------------------------
      - name: Read previous execution report
        id: read_report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ env.ISSUE_NUMBER }}"

          echo "Reading report for issue/PR #$ISSUE_NUM, previous attempt ${{ env.PREV_ATTEMPT }}"

          # Read ALL comments and find the last OpenCode report
          COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
            --jq '.[].body' 2>/dev/null)

          # Try to read the machine-readable HTML comment markers first
          MARKERS=$(echo "$COMMENTS" | grep -oP '<!-- opencode-loop: attempt=\d+ status=(passed|failed) -->' | tail -1)
          MARKER_ATTEMPT=$(echo "$MARKERS" | grep -oP 'attempt=\K\d+')
          MARKER_STATUS=$(echo "$MARKERS" | grep -oP 'status=\K\w+')

          if [ -n "$MARKER_ATTEMPT" ] && [ -n "$MARKER_STATUS" ]; then
            echo "Found machine-readable marker: attempt=$MARKER_ATTEMPT status=$MARKER_STATUS"
            echo "marker_attempt=$MARKER_ATTEMPT" >> $GITHUB_OUTPUT
            echo "marker_status=$MARKER_STATUS" >> $GITHUB_OUTPUT
          else
            echo "No machine-readable marker found. Will fall back to label detection."
            echo "marker_attempt=" >> $GITHUB_OUTPUT
            echo "marker_status=" >> $GITHUB_OUTPUT
          fi

          # Extract the report from the last OpenCode execution comment
          LAST_OC_COMMENT=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
            --jq '.[-1] | .body' 2>/dev/null)
          REPORT=$(echo "$LAST_OC_COMMENT" | sed -n '/<open-code-report>/,/<\/open-code-report>/p')

          if [ -z "$REPORT" ]; then
            REPORT="[No structured report found. Previous execution may have failed early.]"
          fi

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 3: Check continuation conditions
      # -------------------------------------------------------
      - name: Check continuation conditions
        id: check
        run: |
          ISSUE_NUM="${{ env.ISSUE_NUMBER }}"
          NEXT_ATT="${{ env.NEXT_ATTEMPT }}"

          # Get current labels
          LABELS=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/labels" \
            --jq '.[].name' 2>/dev/null)

          # Priority 1: Check machine-readable markers
          MARKER_ATTEMPT="${{ steps.read_report.outputs.marker_attempt }}"
          MARKER_STATUS="${{ steps.read_report.outputs.marker_status }}"

          if [ -n "$MARKER_STATUS" ]; then
            echo "Machine marker indicates previous attempt ended with status: $MARKER_STATUS"

            if [ "$MARKER_STATUS" = "passed" ]; then
              echo "Tests already passed (per marker). Stopping."
              echo "should_run=false" >> $GITHUB_OUTPUT
              # Add passed label if missing
              if ! echo "$LABELS" | grep -q "auto-fix/passed"; then
                gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/labels" \
                  --method POST --field "labels[]=auto-fix/passed" --silent 2>/dev/null || true
              fi
              exit 0
            fi
          fi

          # Priority 2: Check labels
          if echo "$LABELS" | grep -q "needs-human-review"; then
            echo "needs-human-review label present. Stopping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
              --method POST \
              --field "body=Auto-fix scheduler stopped: \`needs-human-review\` label is already present.
            To restart, remove the label and comment \`继续自动修复\`."
            exit 0
          fi

          if echo "$LABELS" | grep -q "auto-fix/passed"; then
            echo "auto-fix/passed label present. Stopping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Priority 3: Count completed attempts from HTML markers
          ALL_COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
            --jq '.[].body' 2>/dev/null)
          COMPLETED=$(echo "$ALL_COMMENTS" | grep -oP '<!-- opencode-loop: attempt=\d+ status=(passed|failed) -->' | wc -l)

          if [ "$COMPLETED" -ge 3 ]; then
            echo "Already completed $COMPLETED attempts (from markers). Stopping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/labels" \
              --method POST --field "labels[]=needs-human-review" --silent 2>/dev/null || true
            exit 0
          fi

          # Check label-based attempt count as fallback
          LABEL_COUNT=0
          echo "$LABELS" | grep -q "auto-fix/attempt-1" && LABEL_COUNT=$((LABEL_COUNT + 1))
          echo "$LABELS" | grep -q "auto-fix/attempt-2" && LABEL_COUNT=$((LABEL_COUNT + 1))
          echo "$LABELS" | grep -q "auto-fix/attempt-3" && LABEL_COUNT=$((LABEL_COUNT + 1))

          # If markers and labels conflict, stop for safety
          if [ "$COMPLETED" -ne "$LABEL_COUNT" ] && [ "$COMPLETED" -gt 0 ] && [ "$LABEL_COUNT" -gt 0 ]; then
            echo "::warning::Marker count ($COMPLETED) and label count ($LABEL_COUNT) conflict."
            echo "::warning::Stopping auto-fix for safety. Manual review required."
            echo "should_run=false" >> $GITHUB_OUTPUT
            gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/labels" \
              --method POST --field "labels[]=needs-human-review" --silent 2>/dev/null || true
            exit 0
          fi

          echo "should_run=true" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 4: Generate next /opencode command
      # -------------------------------------------------------
      - name: Generate next /opencode command
        id: generate
        if: steps.check.outputs.should_run == 'true'
        env:
          PREVIOUS_REPORT: ${{ steps.read_report.outputs.report }}
        run: |
          NEXT_ATT="${{ env.NEXT_ATTEMPT }}"

          OPENCODE_COMMAND="/opencode

          ## Auto-Fix Cycle (Attempt $NEXT_ATT of 3)

          ### Task
          Review the previous attempt's results and fix remaining issues.
          Previous execution report:
          $PREVIOUS_REPORT

          ### Prohibited Scope
          - Do NOT modify: .github/workflows/, opencode.json, docs/codex-opencode-loop.md, AGENTS.md
          - Do NOT modify business code (PHP, Vue, JS, CSS, migrations) unless the task requires it
          - Do NOT push to master branch
          - Do NOT auto-merge any PR

          ### Key Files to Check
          - Review failing tests and affected source files from the previous report

          ### Model Requirement
          This task MUST use the OpenCode Go plan model: opencode-go/deepseek-v4-flash.
          NEVER use deepseek/deepseek-v4-flash, bare deepseek-v4-flash, or any other model.
          If opencode-go/deepseek-v4-flash is unavailable, fail immediately.
          Do NOT fall back to any other model.

          ### Skills / Superpowers Requirement
          Before starting work, use the OpenCode skill tool to discover available skills.
          Select the most appropriate skill(s) based on this task type (debugging/fix cycle).
          After completing the work, report which skill(s) you actually used.
          If no skill was appropriate or if the skill tool is unavailable, explain why.

          ### Test Requirement
          Run:
          1. php artisan test --filter=ReviewFsrsTest
          2. php artisan test --filter=FsrsSchedulingServiceTest
          3. php artisan test --filter=WordSense
          All three must pass.

          ### Report Format
          After completion, provide a structured report:

          <open-code-report>
          [attempt: $NEXT_ATT]
          [model: <model used>]
          [skills: <skills used, or "none" with reason>]
          [modified_files: <list>]
          [changes: <summary>]
          [tests_run: <list>]
          [tests_passed: yes/no]
          [failures: <remaining or none>]
          [next_step: <suggestion>]
          </open-code-report>

          End with machine-readable marker:
          <!-- opencode-loop: attempt=$NEXT_ATT status=running -->

          ### Stop Rule
          If this is attempt 3 and tests still fail, the system will stop automatically and add needs-human-review."

          echo "command<<EOF" >> $GITHUB_OUTPUT
          echo "$OPENCODE_COMMAND" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 5: Post /opencode command to issue/PR
      # -------------------------------------------------------
      - name: Post next /opencode command
        if: steps.check.outputs.should_run == 'true'
        env:
          NEXT_COMMAND: ${{ steps.generate.outputs.command }}
        run: |
          ISSUE_NUM="${{ env.ISSUE_NUMBER }}"

          echo "Posting /opencode command for attempt ${{ env.NEXT_ATTEMPT }}..."

          gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
            --method POST \
            --field "body=$NEXT_COMMAND"

          echo "Done. /opencode command posted for attempt ${{ env.NEXT_ATTEMPT }}."
